name: "CI: dotnet-service"

on:
  push:
    branches: [main]
    paths:
      - "services/dotnet-service/**"
      - ".github/workflows/ci-dotnet.yml"
  pull_request:
    paths:
      - "services/dotnet-service/**"
      - ".github/workflows/ci-dotnet.yml"

  workflow_dispatch:

concurrency:
  group: ci-dotnet-${{ github.ref }}
  cancel-in-progress: true

jobs:

  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.version.outputs.build-version }}
      docker-push: ${{ steps.setup-ci.outputs.docker-push }}
      docker-tags: ${{ steps.setup-ci.outputs.docker-tags }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # - name: Secret Detection (TruffleHog)
      #   uses: trufflesecurity/trufflehog@v3.94.3
      #   with:
      #     path: ./
      #     base: ${{ github.event.pull_request.base.sha || github.sha }}
      #     head: HEAD
      #     extra_args: --fail --results=verified,unknown

      # TODO lint

      - name: "Setup git config"
        uses: mmastersvz/central-ci/actions/setup-git-config@main

      - name: "Resolve version"
        id: version
        uses: mmastersvz/central-ci/actions/resolve-version@main
        with:
          service: dotnet-service
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup CI"
        id: setup-ci
        env:
          SERVICE: dotnet-service
        run: |
          if [[ github.event_name == 'pull_request' ]]; then
            echo "This is a PR build. Docker image will not be pushed."
            echo "docker-push=false" >> $GITHUB_OUTPUT
          else
            echo "This is a push to main. Docker image will be pushed."
            echo "docker-push=true" >> $GITHUB_OUTPUT
          fi

          docker_tags="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${SERVICE}:${{ github.sha }}"
          if [[ github.event_name == 'pull_request' ]]; then
            echo "This is a PR build. Docker image will be tagged with pr-${{ github.event.pull_request.number }}."
          else
            echo "This is a push to main. Docker image will be pushed with tags: ${{ steps.version.outputs.build-version }} and latest."
            docker_tags="${docker_tags},ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${SERVICE}:${{ steps.version.outputs.build-version }}"
            docker_tags="${docker_tags},ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${SERVICE}:latest"
          fi
          echo "docker-tags=${docker_tags}" >> $GITHUB_OUTPUT


  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: services/dotnet-service
    env:
      SERVICE: dotnet-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # NuGet packages are cached by the NuGet global packages folder path + lock file hash.
      # This avoids re-downloading packages on every run.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Build and Test Action
        uses: mmastersvz/central-ci/actions/dotnet-build-test@main
        with:
          build-version: ${{ needs.setup.outputs.build-version }}
          project-path: 'src/DotnetService'
          working-directory: 'services/dotnet-service'

      - name: Docker Publish Image
        uses: mmastersvz/central-ci/actions/docker-publish@main
        with:
          registry-password: ${{ github.token }}
          docker-push: ${{ needs.setup.outputs.docker-push }}
          docker-tags: ${{ needs.setup.outputs.docker-tags }}
          context: ./services/dotnet-service
          cache-scope: ${{ env.SERVICE }}

      - name: Trivy FS Scan (source)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      # - name: Upload Trivy SARIF
      #   uses: github/codeql-action/upload-sarif@v4
      #   with:
      #     sarif_file: "trivy-results.sarif"
