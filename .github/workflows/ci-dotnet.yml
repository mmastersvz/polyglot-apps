name: "CI: dotnet-service"

on:
  push:
    branches: [main]
    paths:
      - "services/dotnet-service/**"
      - ".github/workflows/ci-dotnet.yml"
  pull_request:
    paths:
      - "services/dotnet-service/**"
      - ".github/workflows/ci-dotnet.yml"

  workflow_dispatch:

concurrency:
  group: ci-dotnet-${{ github.ref }}
  cancel-in-progress: true

jobs:

  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.version.outputs.build-version }}
      docker-push: ${{ steps.setup-ci.outputs.docker-push }}
      docker-tags: ${{ steps.setup-ci.outputs.docker-tags }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # - name: Secret Detection (TruffleHog)
      #   uses: trufflesecurity/trufflehog@v3.94.3
      #   with:
      #     path: ./
      #     base: ${{ github.event.pull_request.base.sha || github.sha }}
      #     head: HEAD
      #     extra_args: --fail --results=verified,unknown

      # TODO lint

      - name: "Setup git config"
        uses: mmastersvz/central-ci/actions/setup-git-config@main

      - name: "Resolve version"
        id: version
        uses: mmastersvz/central-ci/actions/resolve-version@main
        with:
          service: dotnet-service
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Setup CI"
        id: setup-ci
        run: |
          if [[ github.event_name == 'pull_request' ]]; then
            echo "This is a PR build. Docker image will not be pushed."
            echo "docker-push=false" >> $GITHUB_OUTPUT
          else
            echo "This is a push to main. Docker image will be pushed."
            echo "docker-push=true" >> $GITHUB_OUTPUT
          fi

          docker-tags="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ github.sha }}"
          if [[ github.event_name == 'pull_request' ]]; then
            echo "This is a PR build. Docker image will be tagged with pr-${{ github.event.pull_request.number }}."
          else
            echo "This is a push to main. Docker image will be pushed with tags: ${{ steps.version.outputs.build-version }} and latest."
            docker-tags="${docker-tags},ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ steps.version.outputs.build-version }}"
            docker-tags="${docker-tags},ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest"
          fi
          echo "docker-tags=${docker-tags}" >> $GITHUB_OUTPUT


  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: services/dotnet-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # NuGet packages are cached by the NuGet global packages folder path + lock file hash.
      # This avoids re-downloading packages on every run.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore src/DotnetService

      - name: Build
        run: |
            dotnet publish src/DotnetService \
              -c Release \
              -o ./publish \
              --no-self-contained \
              /p:Version=${{ needs.setup.outputs.build-version }}

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

      - name: Login to GHCR
        if: ${{ needs.setup.outputs.docker-push == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build & Push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .
          push: ${{ needs.setup.outputs.docker-push }}
          tags: ${{ needs.setup.outputs.docker-tags }}
          # platforms: linux/amd64,linux/arm64
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Trivy FS Scan (source)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
