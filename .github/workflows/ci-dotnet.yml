name: "CI: dotnet-service"

on:
  push:
    branches: [main]
    paths:
      - "services/dotnet-service/**"
      - ".github/workflows/ci-dotnet.yml"
  pull_request:
    paths:
      - "services/dotnet-service/**"
      - ".github/workflows/ci-dotnet.yml"

  workflow_dispatch:

concurrency:
  group: ci-dotnet-${{ github.ref }}
  cancel-in-progress: true

jobs:

  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      app-dir: ${{ steps.setup-ci.outputs.app-dir }}
      app-name: ${{ steps.setup-ci.outputs.app }}
      build-version: ${{ steps.version.outputs.build-version }}
      docker-push: ${{ steps.setup-ci.outputs.docker-push }}
      dotnet-version: ${{ steps.setup-ci.outputs.dotnet-version }}
      docker-tags: ${{ steps.setup-ci.outputs.docker-tags }}
      project-path: ${{ steps.setup-ci.outputs.project-path }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Version"
        id: version
        uses: mmastersvz/central-ci/actions/resolve-version@main
        with:
          service: dotnet-service
          token: ${{ secrets.GITHUB_TOKEN }}

      # must be after version step since it uses the build version to determine docker tags
      - name: "Setup CI"
        id: setup-ci
        env:
          APP_NAME: dotnet-service
          APP_DIR: services/dotnet-service
          PROJECT_PATH: src/DotnetService
          DOTNET_VERSION: 8.0.x
        run: |
          echo "app-name=${APP_NAME}" >> $GITHUB_OUTPUT
          echo "app-dir=${APP_DIR}" >> $GITHUB_OUTPUT
          echo "project-path=${PROJECT_PATH}" >> $GITHUB_OUTPUT
          echo "dotnet-version=${DOTNET_VERSION}" >> $GITHUB_OUTPUT

          if [[ github.event_name == 'pull_request' ]]; then
            echo "This is a PR build. Docker image will not be pushed."
            echo "docker-push=false" >> $GITHUB_OUTPUT
          else
            echo "This is a push to main. Docker image will be pushed."
            echo "docker-push=true" >> $GITHUB_OUTPUT
          fi

          docker_tags="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${APP_NAME}:${{ github.sha }}"
          if [[ github.event_name == 'pull_request' ]]; then
            echo "This is a PR build. Docker image will be tagged with pr-${{ github.event.pull_request.number }}."
          else
            echo "This is a push to main. Docker image will be pushed with tags: ${{ steps.version.outputs.build-version }} and latest."
            docker_tags="${docker_tags},ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${APP_NAME}:${{ steps.version.outputs.build-version }}"
            docker_tags="${docker_tags},ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${APP_NAME}:latest"
          fi
          echo "docker-tags=${docker_tags}" >> $GITHUB_OUTPUT

      - name: "Security: Secret Detection (TruffleHog)"
        uses: trufflesecurity/trufflehog@v3.94.3
        with:
          # path: ./
          base: ${{ github.event.pull_request.base.sha || github.sha }}
          head: HEAD
          extra_args: --results=verified,unknown
          # extra_args: --fail --results=verified,unknown

      # - name: "Cache: Super-Linter Docker layers"
      #   uses: actions/cache@v4
      #   with:
      #     path: /tmp/.buildx-cache
      #     key: ${{ runner.os }}-superlinter-${{ github.sha }}
      #     restore-keys: |
      #       ${{ runner.os }}-superlinter-

      # - name: "Lint: Code Base"
      #   uses: super-linter/super-linter@v8
      #   env:
      #     VALIDATE_ALL_CODEBASE: true # false TODO: Only lint changes (faster)
      #     VALIDATE_CSHARP: true
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     FILTER_REGEX_INCLUDE: .*${{ steps.setup-ci.outputs.app-dir }}/.*

      - name: "Setup: .NET"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.setup-ci.outputs.dotnet-version }}

      - name: "Lint: Dotnet Format"
        run: dotnet format ${{ steps.setup-ci.outputs.app-dir }} --verify-no-changes

      - name: "Security Scan: Trivy (source code)"
        uses: mmastersvz/central-ci/actions/trivy-source-scan@main
        with:
          app-name: ${{ steps.setup-ci.outputs.app-name }}
          scan-ref: ${{ steps.setup-ci.outputs.app-dir }}

      # - name: "Setup git config"
      #   uses: mmastersvz/central-ci/actions/setup-git-config@main

  build:
    name: "Build & Test"
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: ${{ needs.setup.outputs.app-dir }}

    steps:
      - uses: actions/checkout@v4

      # - name: "Setup: .NET"
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: ${{ needs.setup.outputs.dotnet-version }}

      # NuGet packages are cached by the NuGet global packages folder path + lock file hash.
      # This avoids re-downloading packages on every run.
      - name: "Cache: NuGet packages"
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: "Build: .NET and Test"
        uses: mmastersvz/central-ci/actions/dotnet-build-test@main
        with:
          build-version: ${{ needs.setup.outputs.build-version }}
          dotnet-version: ${{ needs.setup.outputs.dotnet-version }}
          project-path: ${{ needs.setup.outputs.project-path }}
          working-directory: ${{ needs.setup.outputs.app-dir }}

      - name: "Docker: Build and Publish Image"
        uses: mmastersvz/central-ci/actions/docker-publish@main
        with:
          registry-password: ${{ github.token }}
          docker-push: ${{ needs.setup.outputs.docker-push }}
          docker-tags: ${{ needs.setup.outputs.docker-tags }}
          context: ./${{ needs.setup.outputs.app-dir }}
          cache-scope: ${{ needs.setup.outputs.app-name }}

  # security:
  #   name: "Security"
  #   runs-on: ubuntu-latest
  #   needs: [setup, build]
  #   steps:

      - name: "Security: Trivy (container image)"
        uses: mmastersvz/central-ci/actions/trivy-image-scan@main
        with:
          app-name: ${{ needs.setup.outputs.app-name }}
          image-ref: ${{ needs.setup.outputs.docker-tags }}
