name: "CI: go-service"

on:
  push:
    branches: [main]
    paths:
      - "services/go-service/**"
      - ".github/workflows/ci-go.yml"
  pull_request:
    paths:
      - "services/go-service/**"
      - ".github/workflows/ci-go.yml"

  workflow_dispatch:

concurrency:
  group: ${{ github.event_name == 'pull_request' && github.run_id || 'release-main' }}
  cancel-in-progress: false

env:
  APP_NAME: go-service
  APP_DIR: services/go-service
  PROJECT_PATH: .
  LANGUAGE: go
  TOOL_VERSIONS: ./.tool-versions

jobs:

  init-security-scans:
    name: "Initial security scans"
    runs-on: ubuntu-latest
    steps:

      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for Secrets
        uses: mmastersvz/central-ci/actions/secret-scan@main

      - name: "Security Scan: Trivy (source code)"
        uses: mmastersvz/central-ci/actions/trivy-source-scan@main
        with:
          app-name: ${{ env.APP_NAME }}
          scan-ref: ${{ env.APP_DIR }}

  setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.version.outputs.build-version }}
      docker-push: ${{ steps.setup-ci.outputs.docker-push }}
      # dotnet-version: ${{ steps.setup-ci.outputs.dotnet-version }}
      go-version: ${{ steps.setup-ci.outputs.go-version }}
      docker-tags: ${{ steps.setup-ci.outputs.docker-tags }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Capture commit SHA
        id: sha
        run: echo "commit_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: "Version"
        id: version
        uses: mmastersvz/central-ci/actions/resolve-version@main
        with:
          service: go-service
          token: ${{ secrets.GITHUB_TOKEN }}

      # must be after version step since it uses the build version to determine docker tags
      - name: "Setup CI"
        id: setup-ci
        # env:
        #   APP_NAME: go-service
        #   APP_DIR: services/go-service
        #   PROJECT_PATH: .
        #   LANGUAGE: go
        #   TOOL_VERSIONS: ./.tool-versions
        run: |
          if [ ${{ env.LANGUAGE }} == "go" ]; then
            LANGUAGE_NAME="golang"
          else
            LANGUAGE_NAME=${{ env.LANGUAGE }}
          fi
          # Look for the line starting with the tool name and get the second column
          tool_version=$(grep "^${LANGUAGE_NAME} " "${{ env.TOOL_VERSIONS }}" | awk '{print $2}')

          if [ -z "$tool_version" ]; then
            echo "::error::Tool '${LANGUAGE_NAME}' not found in ${{ env.TOOL_VERSIONS }}"
            exit 1
          fi

          echo "${{ env.LANGUAGE }}-version=${tool_version}" >> $GITHUB_OUTPUT

          if [[ github.event_name == 'pull_request' ]]; then
            echo "This is a PR build. Docker image will not be pushed."
            echo "docker-push=false" >> $GITHUB_OUTPUT
          else
            echo "This is a push to main. Docker image will be pushed."
            echo "docker-push=true" >> $GITHUB_OUTPUT
          fi

          docker_tags="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ env.APP_NAME }}:${{ github.sha }}"
          if [[ github.event_name == 'pull_request' ]]; then
            echo "This is a PR build. Docker image will be tagged with pr-${{ github.event.pull_request.number }}."
          else
            echo "This is a push to main. Docker image will be pushed with tags: ${{ steps.version.outputs.build-version }} and latest."
            docker_tags="${docker_tags},ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ env.APP_NAME }}:${{ steps.version.outputs.build-version }}"
            docker_tags="${docker_tags},ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/${{ env.APP_NAME }}:latest"
          fi
          echo "docker-tags=${docker_tags}" >> $GITHUB_OUTPUT

      # TODO: Add super-linter for Go (golangci-lint) and add caching for it

      # - name: "Cache: Super-Linter Docker layers"
      #   uses: actions/cache@v4
      #   with:
      #     path: /tmp/.buildx-cache
      #     key: ${{ runner.os }}-superlinter-${{ github.sha }}
      #     restore-keys: |
      #       ${{ runner.os }}-superlinter-

      # - name: "Lint: Code Base"
      #   uses: super-linter/super-linter@v8
      #   env:
      #     VALIDATE_ALL_CODEBASE: true # false TODO: Only lint changes (faster)
      #     VALIDATE_CSHARP: true
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     FILTER_REGEX_INCLUDE: .*${{ steps.setup-ci.outputs.app-dir }}/.*

      # - name: "Setup: .NET"
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: ${{ steps.setup-ci.outputs.dotnet-version }}

      - name: "Lint: golang"
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.3
          working-directory: ./${{ env.APP_DIR }}

  test:
    name: "Build & Test"
    runs-on: ubuntu-latest
    needs: setup
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: "Build: Run Go CI"
        uses: mmastersvz/central-ci/actions/go-build-test@main
        with:
          app-dir: ${{ env.APP_DIR }}

      - name: "Docker: Build and Publish Image"
        uses: mmastersvz/central-ci/actions/docker-publish@main
        with:
          registry-password: ${{ github.token }}
          docker-push: ${{ needs.setup.outputs.docker-push }}
          docker-tags: ${{ needs.setup.outputs.docker-tags }}
          context: ./${{ env.APP_DIR }}
          cache-scope: ${{ env.APP_NAME }}

  # post-security-scans:
  #   name: "Post security scans"
  #   runs-on: ubuntu-latest
  #   needs: [setup, build]
  #   steps:

      - name: "Security: Trivy (container image)"
        uses: mmastersvz/central-ci/actions/trivy-image-scan@main
        with:
          app-name: ${{ env.APP_NAME }}
          image-ref: ${{ needs.setup.outputs.docker-tags }}
