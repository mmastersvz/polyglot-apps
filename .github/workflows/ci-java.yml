# .github/workflows/ci-java.yml
#
# Triggered ONLY when files under services/java-service/ change (path filtering).
# Demonstrates: Maven local repo caching, Spring Boot test, reusable release.

name: "CI: java-service"

on:
  push:
    branches: [main]
    paths:
      - "services/java-service/**"
      - ".github/workflows/ci-java.yml"
  pull_request:
    paths:
      - "services/java-service/**"
      - ".github/workflows/ci-java.yml"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.run_id || 'main' }}
  cancel-in-progress: false

jobs:
  ci:
    uses: mmastersvz/central-ci/.github/workflows/lib-ci-java.yml@main
    with:
      app-name:     java-service
      app-dir:      services/java-service
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

