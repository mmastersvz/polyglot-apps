# .github/workflows/ci-java.yml
#
# Triggered ONLY when files under services/java-service/ change (path filtering).
# Demonstrates: Maven local repo caching, Spring Boot test, reusable release.

name: "CI: java-service"

on:
  push:
    branches: [main]
    paths:
      - "services/java-service/**"
      - ".github/workflows/ci-java.yml"
  pull_request:
    paths:
      - "services/java-service/**"
      - ".github/workflows/ci-java.yml"

  workflow_dispatch:

concurrency:
  group: ci-java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Build and test with Maven local repo caching
  # ─────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/java-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          # The setup-java action has built-in Maven caching —
          # pass the pom.xml path and it handles the rest.
          cache: maven
          cache-dependency-path: services/java-service/pom.xml

      - name: Build and test
        run: mvn -B verify

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-surefire-reports
          path: services/java-service/target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Docker build/push + Release
  # ─────────────────────────────────────────────
  release:
    name: Release
    needs: test
    uses: ./.github/workflows/reusable-service-release.yml
    with:
      service: java-service
      image-name: java-service
      working-directory: services/java-service
      is-release: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
