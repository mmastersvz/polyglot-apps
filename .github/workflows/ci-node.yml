# .github/workflows/ci-node.yml
#
# Triggered ONLY when files under services/node-service/ change (path filtering).
# Demonstrates: npm caching, matrix across Node versions, reusable release.

name: "CI: node-service"

on:
  push:
    branches: [main]
    paths:
      - "services/node-service/**"
      - ".github/workflows/ci-node.yml"
  pull_request:
    paths:
      - "services/node-service/**"
      - ".github/workflows/ci-node.yml"

  workflow_dispatch:

concurrency:
  group: ci-node-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Matrix: test across multiple Node versions
  # ─────────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
      fail-fast: false
    defaults:
      run:
        working-directory: services/node-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # Caches node_modules based on package-lock.json hash
          cache: npm
          cache-dependency-path: services/node-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test

      - name: Upload coverage
        if: matrix.node-version == '20'
        uses: actions/upload-artifact@v4
        with:
          name: node-coverage
          path: services/node-service/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Docker build/push + Release (only after all matrix legs pass)
  # ─────────────────────────────────────────────
  release:
    name: Release
    needs: test
    uses: ./.github/workflows/reusable-service-release.yml
    with:
      service: node-service
      image-name: node-service
      working-directory: services/node-service
      is-release: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
