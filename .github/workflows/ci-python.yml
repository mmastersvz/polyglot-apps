# .github/workflows/ci-python.yml
#
# Triggered ONLY when files under services/python-service/ change (path filtering).
# Demonstrates: pip caching with virtualenv, matrix across Python versions, reusable release.

name: "CI: python-service"

on:
  push:
    branches: [main]
    paths:
      - "services/python-service/**"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "services/python-service/**"
      - ".github/workflows/ci-python.yml"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.run_id || 'main' }}
  cancel-in-progress: false

jobs:
  ci:
    uses: mmastersvz/central-ci/.github/workflows/lib-ci-python.yml@main
    with:
      app-name:     python-service
      app-dir:      services/python-service
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}

